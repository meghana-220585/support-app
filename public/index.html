<!DOCTYPE html>
<html>
<head>
  <title>Customer Support</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Customer Support</h2>

<button onclick="googleLogin()">Login with Google</button>
<button onclick="githubLogin()">Login with GitHub</button>

<script>
function googleLogin() {
  const clientId = "google_client_id";
  const redirectUri = "http://localhost:3000/callback";

  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=code&scope=profile email`;

  window.location.href = url;
}

function githubLogin() {
  const clientId = "github_client_id";
  const redirectUri = "http://localhost:3000/callback";

  const url = `https://github.com/login/oauth/authorize?client_id=${clientId}&redirect_uri=${redirectUri}`;

  window.location.href = url;
}
</script>

</body>
</html>
