<!DOCTYPE html>
<html>
<head>
  <title>Student Support</title>
</head>
<body>

<h2>Student Support</h2>

<button id="loginBtn">Login with Firebase Google</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyABKyYnH3fTvbMoWNhZI67I1gWo8uAVeQU",
  authDomain: "my-project-94903-29194.firebaseapp.com",
  projectId: "my-project-94903-29194"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ attach click event properly
document.getElementById("loginBtn").addEventListener("click", () => {
  const provider = new GoogleAuthProvider();

  signInWithPopup(auth, provider)
    .then((result) => {
      alert("Welcome " + result.user.email);
    })
    .catch((error) => {
      console.error(error);
      alert(error.message);
    });
});
</script>

</body>
</html>
